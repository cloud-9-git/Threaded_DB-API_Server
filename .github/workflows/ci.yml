name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y build-essential curl nodejs clang
      - name: Build
        run: make
      - name: Unit test
        run: make test
      - name: API test
        run: make api-test
